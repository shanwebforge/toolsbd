<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
   <script>
    (function () {
      try {
        const theme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = theme === 'dark' || (!theme && prefersDark);
        if (isDark) {
          document.documentElement.classList.add('dark-mode');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/sub-file.css" />
  <link rel="stylesheet" href="/components/header.css" />
  <link rel="stylesheet" href="/components/footer.css" />
  <title>গাড়ি রেজিস্ট্রেশন তথ্য (BRTA)</title>
  <style>
p.description {
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 25px;
}

input[type="text"] {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 6px;
  margin-bottom: 20px;
}

.link-box {
  background: #e9f3ff;
  border: 1px solid #b8daff;
  padding: 12px 15px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.link-text {
  font-weight: 600;
  color: #0056b3;
  font-size: 14px;
  flex: 1;
  text-align: left;
  word-break: break-word;
}

.button-group {
  display: flex;
  gap: 8px;
}

.btn {
  padding: 6px 12px;
  font-size: 13px;
  border: none;
  border-radius: 5px;
  color: white;
  background-color: #077A7D;
  cursor: pointer;
  text-decoration: none;
  transition: background-color 0.3s;
  white-space: nowrap;
  display: inline-block;
}

.btn:hover {
  background-color: #066264;
}

.copied-msg {
  color: green;
  font-size: 13px;
  margin-top: 10px;
  display: none;
}

@media (max-width: 500px) {
  .link-box {
    flex-direction: column;
    align-items: flex-start;
  }

  .button-group {
    width: 100%;
    justify-content: flex-start;
  }
}


html.dark-mode p.description {
  color: #cbd5e1;
}

html.dark-mode input[type="text"] {
  background-color: #334155;
  color: #e2e8f0;
  border: 1px solid #475569;
}

html.dark-mode .link-box {
  background: #c1eaf7;
  border: 1px solid #8aeef5;
}

html.dark-mode .link-text {
  color: #000000;
}

html.dark-mode .btn {
  background-color: #077A7D;
  color: white;
}

html.dark-mode .btn:hover {
  background-color: #066264;
}

html.dark-mode .copied-msg {
  color: #34d399;
}

  </style>
</head>
<body>
 <main class="file-section">
  <div class="file-container">
    <div class="file-header">
    <div class="file-title">
        <h2>🚗 গাড়ি রেজিস্ট্রেশন তথ্য</h2>
        <div class="title-underline"></div>
    </div>
    
    <div class="file-content-text">
        <p> গাড়ির নাম্বার দিয়ে বাংলাদেশ রোড ট্রান্সপোর্ট অথরিটি (BRTA) এর ওয়েবসাইটে যাচাই করতে নিচের লিংক ব্যবহার করুন।</p>

    </div>
</div>
    
    <div class="file-footer">

    <input type="text" id="vehicleNumber" placeholder="যেমনঃ ঢাকা-মেট্রো-গ ১২৩৪৫৬" />

    <div class="link-box">
      <div class="link-text" id="brtaLink">
        https://www.brta.gov.bd/site/page/12fca8a4-84e2-4002-bdf4-34768e5e42bd
      </div>
      <div class="button-group">
        <button class="btn" onclick="copyLink()">Copy</button>
        <a class="btn" href="https://www.brta.gov.bd/site/page/12fca8a4-84e2-4002-bdf4-34768e5e42bd" target="_blank">Visit</a>
      </div>
    </div>

    <div class="copied-msg" id="copiedMsg">✅ লিংক কপি হয়েছে!</div>
  </div>
  </div>
  </main>
  <script>
    function copyLink() {
      const link = document.getElementById("brtaLink").textContent;
      navigator.clipboard.writeText(link).then(() => {
        const msg = document.getElementById("copiedMsg");
        msg.style.display = "block";
        setTimeout(() => {
          msg.style.display = "none";
        }, 2000);
      });
    }
  </script>
<script src="/components/header.js"></script>
<script src="/components/footer.js"></script>
</body>
</html>
