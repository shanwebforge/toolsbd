<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
   <script>
    (function () {
      try {
        const theme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = theme === 'dark' || (!theme && prefersDark);
        if (isDark) {
          document.documentElement.classList.add('dark-mode');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/sub-file.css" />
  <link rel="stylesheet" href="/components/header.css" />
  <link rel="stylesheet" href="/components/footer.css" />
  
  <title>NID Verification Link Info</title>
  <style>
    /* Light Mode (default) */


p.description {
  font-size: 15px;
  margin-bottom: 25px;
  line-height: 1.6;
}

.link-box {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #eaf2ff;
  border: 1px solid #b4d3ff;
  padding: 10px 15px;
  border-radius: 8px;
  word-break: break-word;
  gap: 10px;
  flex-wrap: wrap;
}

.link-text {
  font-weight: 600;
  color: #2c7be5;
  font-size: 14px;
  flex: 1;
  text-align: left;
}

.button-group {
  display: flex;
  gap: 8px;
}

.copy-btn, .visit-btn {
  background-color: #2c7be5;
  color: white;
  border: none;
  border-radius: 5px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.3s;
  white-space: nowrap;
  text-decoration: none;
}

.copy-btn:hover, .visit-btn:hover {
  background-color: #1a5dc9;
}

.copied-msg {
  margin-top: 12px;
  color: green;
  font-size: 13px;
  display: none;
}

@media (max-width: 500px) {
  .link-box {
    flex-direction: column;
    align-items: flex-start;
  }

  .button-group {
    width: 100%;
    justify-content: flex-start;
  }
}



html.dark-mode p.description {
  color: #94a3b8;
}

html.dark-mode .link-box {
  background: #334155;
  border: 1px solid #475569;
}

html.dark-mode .link-text {
  color: #93c5fd;
}

html.dark-mode .copy-btn,
html.dark-mode .visit-btn {
  background-color: #077A7D; /* same as light mode button */
  color: white;
}

html.dark-mode .copy-btn:hover,
html.dark-mode .visit-btn:hover {
  background-color: #066264; /* same hover color */
}

html.dark-mode .copied-msg {
  color: #4ade80; /* lighter green */
}

  </style>
</head>
<body>
 <main class="file-section">
  <div class="file-container">
    <div class="file-header">
    <div class="file-title">
        <h2>🔎 NID Verification Link Info</h2>
        <div class="title-underline"></div>
    </div>
    
    <div class="file-content-text">
        <p> আপনি যদি আপনার জাতীয় পরিচয়পত্র (NID) অনলাইনে যাচাই করতে চান, তাহলে নিচের অফিসিয়াল লিংকে গিয়ে আপনার তথ্য যাচাই করতে পারবেন।</p>

    </div>
</div>
    
    
    
    <div class="file-footer">
    <div class="link-box">
      <div class="link-text" id="nidLink">
        https://services.nidw.gov.bd/nid-pub/
      </div>
      <div class="button-group">
        <button class="copy-btn" onclick="copyLink()">Copy</button>
        <a class="visit-btn" href="https://services.nidw.gov.bd/nid-pub/" target="_blank">Visit</a>
      </div>
    </div>

    <div class="copied-msg" id="copiedMsg">✅ Link copied to clipboard!</div>
  </div></div>
 </main>
  <script>
    function copyLink() {
      const link = document.getElementById("nidLink").textContent;
      navigator.clipboard.writeText(link).then(() => {
        const msg = document.getElementById("copiedMsg");
        msg.style.display = "block";
        setTimeout(() => {
          msg.style.display = "none";
        }, 2000);
      });
    }
  </script>
<script src="/components/header.js"></script>
<script src="/components/footer.js"></script>
</body>
</html>
