<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add New Post</title>
  <link rel="stylesheet" href="/blog/css/addpost.css" />
        <link rel="stylesheet" href="/blog/components/header.css" />
  <link rel="stylesheet" href="/blog/components/footer.css" />
</head>
<body>
  <div class="form-container">
    <h2>📝 Add New Post</h2>
    <form id="addPostForm">
      <input type="text" id="title" placeholder="Post Title" required />
      <input type="text" id="author" placeholder="Author Name" readonly />
      
      <!-- Category select -->
      <select id="category" required>
        <option value="">Select Category</option>
        <option value="posts_islamic">Islamic</option>
        <option value="posts_ai">AI</option>
        <option value="posts_tools">Tools Review</option>
        <option value="posts_laptop">Laptop/Desktop</option>
        <option value="posts_proggraming">Programming</option>
        <option value="posts_designer">Designer</option>
        <option value="posts_marketar">Digital Marketing</option>
        <option value="posts_android">Android/iPhone</option>
        <option value="posts_sim">Sim Offer</option>
        <option value="posts_keyboard">Keyboard Shortcut</option>
        <option value="posts_educations">Education</option>
        <option value="posts_freelanching">Freelancing</option>
        <option value="posts_media">Media</option>
      </select>

      <!-- Thumbnail URL (optional) -->
      <input type="text" id="thumbnailURL" placeholder="Thumbnail Image URL (optional)" />

      <textarea id="description" placeholder="Post Description" rows="5" required></textarea>
      <button type="submit">Submit Post</button>
    </form>
    <p id="msg"></p>
  </div>

  <script type="module" src="/blog/js/addpost.js"></script>
    <script src="/blog/components/headerhome.js"></script>
  <script src="/blog/components/footer.js"></script>
  <script src="/scripts/script.js"></script>
</body>
</html>
