<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Profile</title>
  <link rel="stylesheet" href="/blog/css/profile.css" />
        <link rel="stylesheet" href="/blog/components/header.css" />
  <link rel="stylesheet" href="/blog/components/footer.css" />
  <script type="module" src="/blog/js/profile.js" defer></script>
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    rel="stylesheet"
  />
</head>
<body>
  <div class="container">
    <h2>User Profile</h2>

    <div class="profile-pic-section">
      <label for="profilePicInput" class="profile-pic-label">
        <img
          src="/blog/assets/default-user.png"
          alt="Profile Picture"
          id="profilePic"
          class="profile-pic"
          title="Click to upload new picture"
        />
        <input type="file" id="profilePicInput" accept="image/*" hidden />
      </label>
    </div>

    <form id="profileForm">
      <div class="name-row">
        <input type="text" id="firstName" placeholder="First Name" required />
        <input type="text" id="lastName" placeholder="Last Name" required />
      </div>

      <input type="text" id="address" placeholder="Address" />
      <input type="date" id="dob" placeholder="Date of Birth" />
      <textarea id="bio" placeholder="Short Bio" rows="3"></textarea>

      <input
        type="password"
        id="password"
        placeholder="New Password (leave blank if no change)"
      />

      <button type="submit" class="btn update-btn">Update Profile</button>
      <button type="button" class="btn delete-btn" id="deleteAccountBtn">
        Delete Account
      </button>

      <p id="msg" class="msg"></p>
    </form>
  </div>
    <script src="/blog/components/headerhome.js"></script>
  <script src="/blog/components/footer.js"></script>
  <script src="/scripts/script.js"></script>
</body>
</html>
