<!-- Firebase App and Firestore SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>
<script>
  // আপনার Firebase config বসান নিচে:
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "your-project.firebaseapp.com",
    projectId: "your-project-id",
    storageBucket: "your-project.appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  // Initialize Firebase
  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  async function loadRecentPosts() {
    const postsContainer = document.getElementById('recent-posts');
    const postsQuery = db.collection('posts').orderBy('createdAt', 'desc').limit(5);
    const snapshot = await postsQuery.get();

    snapshot.forEach(doc => {
      const post = doc.data();
      const div = document.createElement('div');
      div.classList.add('recent-post');

      div.innerHTML = `
        <div style="background-image:url('${post.thumbnail}'); height:150px; background-size:cover; position:relative;">
          <div style="position:absolute; bottom:0; background:rgba(0,0,0,0.6); color:#fff; width:100%; padding:5px;">
            ${post.title}
          </div>
        </div>
        <p>${post.content.substring(0, 80)}... <a href="/blog/post/${doc.id}">Read More</a></p>
      `;

      postsContainer.appendChild(div);
    });
  }

  document.addEventListener('DOMContentLoaded', loadRecentPosts);
</script>
