<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Write Post</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"></script>
  <script src="js/firebase.js"></script>
  <script src="/blog/js/auth.js"></script>
  <script src="/blog/js/post.js"></script>
</head>
<body>
  <h1>Write Post in <span id="cat-title"></span></h1>
  <form id="post-form">
    <input type="text" id="title" placeholder="Title" required><br>
    <textarea id="desc" placeholder="Short desc" required></textarea><br>
    <textarea id="content" placeholder="Full content" required></textarea><br>
    <input type="file" id="thumbnail" required><br>
    <button type="submit">Submit</button>
  </form>
  <script>
    document.getElementById("cat-title").innerText = localStorage.cat;
  </script>
</body>
</html>
