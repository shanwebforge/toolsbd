    (function () {
      try {
        const theme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (theme === 'dark' || (!theme && prefersDark)) {
          document.documentElement.classList.add('dark-mode');
        }

<script>
document.addEventListener("DOMContentLoaded", function() {
  const logoDiv = document.getElementById('pageTitleLogo');
  if (logoDiv) {
    // Get the page title from document title or fallback
    let pageTitle = document.title || 'Untitled Page';
    
    // Remove any prefix/suffix you don't want (like "| SiteName")
    pageTitle = pageTitle.split('|')[0].trim();
    
    // Limit to 15 characters and add ellipsis if longer
    if (pageTitle.length > 15) {
      pageTitle = pageTitle.substring(0, 15) + '...';
    }
    
    // Insert into logo div
    logoDiv.textContent = pageTitle;
    
    // Optional: Add CSS class for styling
    logoDiv.classList.add('dynamic-title');
  }
});
</script>


<script>
// Robust back button implementation
(function() {
  // Wait for DOM to be fully loaded
  document.addEventListener('DOMContentLoaded', function() {
    const backBtn = document.getElementById('mobileBackBtn');
    
    if (backBtn) {
      backBtn.addEventListener('click', function(e) {
        e.preventDefault();
        console.log('Back button clicked'); // For debugging
        
        try {
          if (window.history && window.history.length > 1) {
            window.history.back();
          } else {
            // Fallback for when there's no history
            window.location.href = document.referrer || '/';
          }
        } catch (error) {
          console.error('Back navigation failed:', error);
          window.location.href = '/'; // Ultimate fallback
        }
      });
    } else {
      console.warn('Back button element not found');
    }
  });
})();
</script>

<!-- ✅ Dark Mode Script (put at end of header or in footer) -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const toggles = document.querySelectorAll(".toggle-theme");
    const savedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const isDark = savedTheme === "dark" || (!savedTheme && prefersDark);

    // Set initial mode
    document.documentElement.classList.toggle("dark-mode", isDark);
    toggles.forEach(t => t.checked = isDark);

    // Handle toggle change
    toggles.forEach(toggle => {
      toggle.addEventListener("change", () => {
        const enableDark = toggle.checked;
        document.documentElement.classList.toggle("dark-mode", enableDark);
        localStorage.setItem("theme", enableDark ? "dark" : "light");
        toggles.forEach(t => t.checked = enableDark); // sync both toggles
      });
    });
  });
</script>
