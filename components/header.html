<header data-header="main">
  <head>
    <script>
      (function () {
        try {
          const theme = localStorage.getItem('theme');
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (theme === 'dark' || (!theme && prefersDark)) {
            document.documentElement.classList.add('dark-mode');
          }
        } catch (e) {
          console.error('Theme preload error:', e);
        }
      })();
    </script>
  </head>
  
  <div class="header-container">
    <!-- Mobile Back Button -->
    <button class="mobile-back-btn header-back-btn" id="mobileBackBtn" aria-label="Go back">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    
    <!-- Logo -->
    <div class="logo" id="headerLogo">
      <img src="/assets/logo.webp" alt="ToolsBD" height="56px" width="161px">
    </div>
    
    <!-- Page Title for Mobile -->
    <div class="page-title" id="pageTitle">
      <!-- Title will be inserted by JavaScript -->
    </div>
    
    <!-- Desktop Navigation -->
    <nav class="nav-menu" id="navMenu">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/nav-menu/blog/">Blog</a></li>
        <li><a href="/nav-menu/about/">About</a></li>
        <li><a href="/nav-menu/service/">Services</a></li>
        <li><a href="/nav-menu/contact/">Contact</a></li>
        <li class="desktop-toggle">
          <label class="theme-switch" title="Toggle Dark Mode">
            <input type="checkbox" class="toggle-theme" id="toggleThemeDesktop" />
            <span class="slider"></span>
          </label>
        </li>
      </ul>
    </nav>

    <!-- Mobile Menu Icons -->
    <div class="mobile-menu-group" id="mobileMenuGroup">
      <div class="search-icon">
        <i id="searchIconBtn" aria-label="Search" class="fas fa-search"></i>
      </div>

      <div class="bookmark-icon">
        <a href="/nav-menu/bookmark/" class="bookmark-link" aria-label="Bookmarks">
          <i class="bi bi-house-heart"></i>
        </a>
      </div>

      <div class="lang-toggle">
        <i id="langToggleIcon" class="fas fa-globe"></i>
        <ul id="langMenu" class="lang-menu hidden">
          <li data-lang="en">English</li>
          <li data-lang="bn">বাংলা</li>
        </ul>
      </div>
      
      <div class="theme-toggle">
        <i id="themeToggleIcon" class="fas fa-sun"></i>
      </div>
      
      <div class="menu-toggle" id="menuToggle">
        <i>
          <img src="/assets/m.png" alt="menu" class="m-icon">
        </i>
      </div>
    </div>
    
    <!-- Google Translate Element -->
    <div id="google_translate_element" style="display: none;"></div>
  </div>

  <!-- Search Container -->
  <div class="search-container hidden" id="searchContainer">
    <input type="text" id="searchInput" placeholder="খোঁজ করুন..." />
    <button id="searchBtn">
      <i class="fas fa-search"></i>
    </button>
  </div>

  <!-- Search Popup -->
  <div id="searchPopup" class="search-popup hidden">
    <div class="popup-header">
      <span>সার্চ রেজাল্ট</span>
      <button id="closePopup">&times;</button>
    </div>
    <div id="searchResults" class="search-results"></div>
  </div>

  <!-- Mobile Canvas Menu -->
  <div id="mobileCanvas" class="mobile-canvas">
    <div class="canvas-header">
      <h2><img src="/assets/logo.webp" alt="ToolsBD" height="20px" width="161px" class="canvas-logo"/></h2>
      <button id="closeCanvas" title="Close Menu">&times;</button>
    </div>

    <div class="canvas-content">
      <section class="canvas-section">
        <div class="section-header">
          <h3>Menu</h3>
        </div>
        <nav class="canvas-nav">
          <ul>
            <li><a href="/" class="canvas-link"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="/nav-menu/blog/" class="canvas-link"><i class="fas fa-blog"></i> Blog</a></li>
            <li><a href="/nav-menu/about/" class="canvas-link"><i class="fas fa-info-circle"></i> About</a></li>
            <li><a href="/nav-menu/service/" class="canvas-link"><i class="fas fa-concierge-bell"></i> Services</a></li>
            <li><a href="/nav-menu/contact/" class="canvas-link"><i class="fas fa-address-book"></i> Contact</a></li>
          </ul>
        </nav>
      </section>

      <section class="canvas-section">
      <div class="section-header-home">
        <h3>Settings</h3>
      </div>
      <nav class="canvas-nav">
        <ul>
          <li class="setting-item">
            <span class="setting-label">
              <i class="fas fa-moon" style="margin-right: 12px; width: 20px; text-align: center;"></i>
              Dark Mode
            </span>
            <label class="theme-switch" title="Toggle Dark Mode">
              <input type="checkbox" class="toggle-theme" id="toggleThemeMobile" />
              <span class="slider"></span>
            </label>
          </li>
          <li>
            <a href="/nav-menu/profile/" class="canvas-link">
              <i class="fas fa-user-circle" style="margin-right: 12px; width: 20px; text-align: center;"></i>
              Profile
            </a>
          </li>
          <li>
            <a href="/nav-menu/profile/" class="canvas-link">
              <i class="fas fa-tachometer-alt" style="margin-right: 12px; width: 20px; text-align: center;"></i>
              Dashboard
            </a>
          </li>
          <li>
            <a href="/nav-menu/about/" class="canvas-link">
              <i class="fas fa-info" style="margin-right: 12px; width: 20px; text-align: center;"></i>
              Information
            </a>
          </li>
        </ul>
      </nav>
    </section>
    </div>
  </div>
</header>
