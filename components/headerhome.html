 <script>
document.addEventListener("DOMContentLoaded", () => {
  // Search Toggle Icon ও Container
  const searchIconBtn = document.querySelector('.search-icon'); // class use করলে পুর div e click kaj kore
  const searchContainer = document.getElementById("searchContainer");

  // Input ও Popup
  const searchInput = document.getElementById("searchInput");
  const searchBtn = document.getElementById("searchBtn");
  const searchPopup = document.getElementById("searchPopup");
  const closePopup = document.getElementById("closePopup");
  const searchResults = document.getElementById("searchResults");

  // আপনার সাইটের কন্টেন্ট (search data)
  const siteContent = [
    {
      title: "Islamic Tools",
      url: "islamic/",
      desc: "ইসলামিক ক্যালেন্ডার, নামাজের সময়সূচি, কিবলা দিক নির্ণয় সহ নানা ইসলামিক টুল।",
    },
    {
      title: "Daily Use Tools",
      url: "daily-use-tools/",
      desc: "প্রতিদিন ব্যবহৃত সহজ ও দরকারি টুল যেমন কনভার্টার, ক্যালকুলেটর ইত্যাদি।",
    },
    {
      title: "Developer & Designer Tools",
      url: "dev-designer-tools/",
      desc: "JS, HTML, CSS কোড সুন্দরভাবে সাজান ও বিশ্লেষণ করুন।",
    },
    {
      title: "BD Localized Special Tools",
      url: "bd-Localized-Special-tools/",
      desc: "বাংলাদেশ ভিত্তিক প্রয়োজনীয় টুল যেমন এনআইডি যাচাই, BRTC তথ্য ইত্যাদি।",
    },
  ];

  // 🔍 সার্চ ফাংশন
  function doSearch() {
    const query = searchInput.value.trim().toLowerCase();
    searchResults.innerHTML = "";

    if (!query) {
      searchResults.innerHTML = "<p>অনুগ্রহ করে সার্চ করুন।</p>";
      return;
    }

    const results = siteContent.filter(item =>
      item.title.toLowerCase().includes(query) ||
      item.desc.toLowerCase().includes(query)
    );

    if (results.length === 0) {
      searchResults.innerHTML = "<p>কোনো ফলাফল পাওয়া যায়নি।</p>";
    } else {
      results.forEach(item => {
        const p = document.createElement("p");
        p.textContent = item.title;
        p.title = item.desc;
        p.onclick = () => {
          window.location.href = item.url;
        };
        searchResults.appendChild(p);
      });
    }
  }

  // 🔘 Toggle Search Box on Icon Click
  searchIconBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    searchContainer.classList.toggle("hidden");

    if (!searchContainer.classList.contains("hidden")) {
      searchInput.focus();
      searchPopup.classList.add("hidden");
    }
  });

  // Search Button Click
  searchBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    doSearch();
    searchPopup.classList.remove("hidden");
  });

  // Enter Press = Search
  searchInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
      doSearch();
      searchPopup.classList.remove("hidden");
    }
  });

  // Popup Close Button
  closePopup.addEventListener("click", () => {
    searchPopup.classList.add("hidden");
  });

  // Click Outside to Close Everything
  document.addEventListener("click", (e) => {
    if (!searchContainer.contains(e.target) &&
        !searchPopup.contains(e.target) &&
        !searchIconBtn.contains(e.target)) {
      searchContainer.classList.add("hidden");
      searchPopup.classList.add("hidden");
    }
  });
});
</script>



<!-- ✅ Dark Mode Script (put at end of header or in footer) -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const toggles = document.querySelectorAll(".toggle-theme");
    const savedTheme = localStorage.getItem("theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const isDark = savedTheme === "dark" || (!savedTheme && prefersDark);

    // Set initial mode
    document.documentElement.classList.toggle("dark-mode", isDark);
    toggles.forEach(t => t.checked = isDark);

    // Handle toggle change
    toggles.forEach(toggle => {
      toggle.addEventListener("change", () => {
        const enableDark = toggle.checked;
        document.documentElement.classList.toggle("dark-mode", enableDark);
        localStorage.setItem("theme", enableDark ? "dark" : "light");
        toggles.forEach(t => t.checked = enableDark); // sync both toggles
      });
    });
  });
</script>
