<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script>
(function () {
  try {
    const theme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (theme === 'dark' || (!theme && prefersDark)) {
      document.documentElement.classList.add('dark-mode');
    }
  } catch (e) {}
})();
</script>

<title>CSS গ্র্যাডিয়েন্ট জেনারেটর</title>
  <title>Bangla Calendar Converter</title>
  <link rel="stylesheet" href="/css/sub-file.css" />
<link rel="stylesheet" href="/components/header.css">
<link rel="stylesheet" href="/dist/output.css">

<style>
/* Main Box */
.generator {
  width: 100%;
  max-width: 480px;
  padding: 30px;
  border-radius: 18px;
  background: rgba(255,255,255,0.55);
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
  backdrop-filter: blur(14px);
  text-align: center;
}

/* title underline */
.title-underline {
  width: 70px;
  height: 4px;
  background: #6a64ff;
  margin: 8px auto 25px;
  border-radius: 4px;
}

/* Color picker card */
.color-card {
  background: rgba(255,255,255,0.35);
  padding: 12px 14px;
  border-radius: 12px;
  text-align: center;
  min-width: 110px;
  transition: 0.25s ease;
  border: 1px solid rgba(0,0,0,0.05);
}
.color-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.color-card label {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
  display: block;
}
input[type="color"] {
  width: 60px;
  height: 42px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* Row layout */
.color-row {
  display: flex;
  gap: 18px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 10px 0 20px;
}

/* Preview */
#preview {
  height: 185px;
  border-radius: 14px;
  margin: 25px 0;
  border: 1px solid rgba(0,0,0,0.1);
}

/* Code Box */
#cssCode {
  background: #ffffff;
  color: #202020;
  padding: 14px;
  border-radius: 8px;
  font-family: monospace;
  font-size: 14px;
  word-break: break-all;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  background: var(--color-primary);
  border: none;
  border-radius: 10px;
  color: #ececec;
  margin-top: 12px;
  font-size: 16px;
  cursor: pointer;
  transition: .25s ease;
  font-weight: 700;
}
button:hover {
  background: var(--color-primary-dark);
}

/* Direction Row */
.direction-row {
  text-align: center;
  margin: 20px 0;
}

.dir-label {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 12px;
  display: block;
  text-align: center;
}

/* Direction buttons container */
.direction-buttons {
  display: flex;
  justify-content: center;
  align-items: center; /* Vertically center inside flex */
  gap: 12px;
  flex-wrap: wrap;
}

/* Individual direction button */
.dir-btn {
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center; /* Perfect center */
  font-size: 20px;
  border-radius: 10px;
  border: 1px solid var(--color-primary);
  background: none;
  cursor: pointer;
  transition: .25s ease;
  color: var(--text-black);
  margin: 0;
}

/* Hover effect */
.dir-btn:hover {
  background: #6a64ff;
  color: #fff;
  border-color: #6a64ff;
}

/* Active state */
.dir-btn.active {
  background: var(--gradient-primary);
  color: #fff;
  border-color: #6a64ff;
}

/************** DARK MODE **************/
html.dark-mode body {
  --bg: #0d1117;
  color: #fff;
}

html.dark-mode .generator {
  background: rgba(255,255,255,0.08);
}

html.dark-mode .color-card {
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.12);
}

html.dark-mode #preview {
  border: 1px solid #333;
}

html.dark-mode .dir-btn {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.15);
  color: #ddd;
}

html.dark-mode .dir-btn.active {
  background: #564df0;
  color: #fff;
}

/* Mobile */
@media (max-width: 480px) {
  .generator { padding: 22px; }
  #preview { height: 155px; }

  /* Direction buttons mobile scaling */
  .dir-btn {
    width: 36px;
    height: 36px;
    font-size: 18px;
  }
}
</style>
</head>
<body>



   <main class="file-section">
  <div class="file-container">
  <h2 style="text-align: center;">CSS গ্র্যাডিয়েন্ট জেনারেটর</h2>
  <div class="title-underline"></div>

<div class="color-row">
  <div class="color-card">
    <label>রং ১</label>
    <input type="color" id="color1" value="#1C24D0">
  </div>
  <div class="color-card">
    <label>রং ২</label>
    <input type="color" id="color2" value="#B82230">
  </div>
</div>

<!-- Hidden Direction Input -->
<input type="hidden" id="direction" value="to right">

<div class="direction-row">
  <label class="dir-label">গ্র্যাডিয়েন্টের দিক</label>
  <div class="direction-buttons">
    <button class="dir-btn active" data-dir="-135deg" title="তির্যক-নিচে">↖</button>
    <button class="dir-btn" data-dir="to right" title="ডানে">→</button>
    <button class="dir-btn" data-dir="to left" title="বামে">←</button>
    <button class="dir-btn" data-dir="to bottom" title="নিচে">↓</button>
    <button class="dir-btn" data-dir="to top" title="উপরে">↑</button>
    <button class="dir-btn" data-dir="135deg" title="তির্যক">↗</button>
  </div>
</div>

<div id="preview"></div>
<div id="cssCode"></div>
<button onclick="copyCode()">Copy Code</button>
  </div>
</main>

<script>
const color1 = document.getElementById('color1');
const color2 = document.getElementById('color2');
const direction = document.getElementById('direction');
const preview = document.getElementById('preview');
const cssCode = document.getElementById('cssCode');
const dirButtons = document.querySelectorAll('.dir-btn');

// Direction button update
dirButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    dirButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    direction.value = btn.dataset.dir;
    updateGradient();
  });
});

function updateGradient() {
  const grad = `linear-gradient(${direction.value}, ${color1.value}, ${color2.value})`;
  preview.style.background = grad;
  cssCode.textContent = `background: ${grad};`;
}

// Copy
function copyCode() {
  navigator.clipboard.writeText(cssCode.textContent);
  alert("CSS কোড কপি হয়েছে!");
}

// Update on change
color1.addEventListener('input', updateGradient);
color2.addEventListener('input', updateGradient);

// Initial load
updateGradient();
</script>
  <script src="/components/header.js"></script>
  <script src="/components/footer.js"></script>
</body>
</html>
