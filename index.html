<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// -----------------------
// Updates Section
const updatesGrid = document.getElementById("updatesGrid");
const seeAllBtn = document.getElementById("seeAllBtn");
let allUpdates = [];

if (updatesGrid && seeAllBtn) {
  const updatesRef = collection(db, "updates");
  const q = query(updatesRef, orderBy("timestamp", "desc"));

  onSnapshot(q, (snapshot) => {
    allUpdates = [];
    snapshot.forEach(doc => allUpdates.push(doc.data()));
    renderUpdates(allUpdates.slice(0, 3)); // show top 3 updates by default
  });

  seeAllBtn.addEventListener("click", () => {
    renderUpdates(allUpdates);
  });

  function renderUpdates(updates) {
    updatesGrid.innerHTML = "";
    updates.forEach(item => {
      const card = document.createElement("div");
      card.className = "update-card";
      card.innerHTML = `
        <h3>${item.title}</h3>
        <p>${item.content}</p>
      `;
      updatesGrid.appendChild(card);
    });
  }
}

// -----------------------
// Category Click Counter
window.addEventListener('DOMContentLoaded', () => {
  const items = document.querySelectorAll('.main-catagory-item');

  items.forEach(item => {
    const eyeCountSpan = item.querySelector('.eye-count');
    if (!eyeCountSpan) return;

    const href = item.getAttribute('href');
    if (!href) return;

    const slug = href.replace(/\//g, '').trim() || 'default';
    const docRef = doc(db, "category_clicks", slug);

    // Load initial count from Firestore
    getDoc(docRef).then(docSnap => {
      if (docSnap.exists()) {
        eyeCountSpan.textContent = docSnap.data().count || 0;
      } else {
        setDoc(docRef, { count: 0, name: slug });
        eyeCountSpan.textContent = 0;
      }
    });

    // Click handler
    item.addEventListener('click', async (e) => {
      e.preventDefault();

      try {
        // Increment Firestore count
        await updateDoc(docRef, { count: increment(1) });

        // Update displayed count
        const updatedSnap = await getDoc(docRef);
        eyeCountSpan.textContent = updatedSnap.data().count || 0;

        // Redirect after count update
        window.location.href = href;
      } catch (err) {
        console.error(err);
        window.location.href = href; // fallback redirect
      }
    });
  });
});
</script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const items = document.querySelectorAll('.main-catagory-item');

    items.forEach(item => {
      const eyeCountSpan = item.querySelector('.eye-count');
      const slug = item.dataset.slug;

      if (!slug) return;

      const docRef = db.collection('category_clicks').doc(slug);

      // Load initial count from Firestore
      docRef.get().then(doc => {
        if (doc.exists) {
          eyeCountSpan.textContent = doc.data().count || 0;
        } else {
          docRef.set({ count: 0 });
        }
      });

      // Real-time update (optional)
      docRef.onSnapshot(doc => {
        if (doc.exists) {
          eyeCountSpan.textContent = doc.data().count;
        }
      });

      // Click listener
      item.addEventListener('click', (e) => {
        e.preventDefault();

        docRef.update({ count: firebase.firestore.FieldValue.increment(1) })
          .then(() => {
            // Redirect to actual link after count update
            window.location.href = item.getAttribute('href');
          })
          .catch(err => {
            console.error(err);
            window.location.href = item.getAttribute('href'); // fallback
          });
      });
    });
  });
</script>

  <!-- ✅ Global Dark Mode Toggle Script -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const toggleTheme = document.getElementById("toggleTheme");
      const savedTheme = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const isDark = savedTheme === "dark" || (!savedTheme && prefersDark);

      // Initial checked state
      toggleTheme.checked = isDark;

      // Toggle logic
      toggleTheme.addEventListener("change", function () {
        const isDark = toggleTheme.checked;
        document.documentElement.classList.toggle("dark-mode", isDark);
        localStorage.setItem("theme", isDark ? "dark" : "light");
      });
    });
  </script>
