  <script type="module">
   

    // Firebase and Main Application
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC4qAilm3cAJ8FTnv8R66YhG1rEITgKsoM",
      authDomain: "toolsbd24.firebaseapp.com",
      projectId: "toolsbd24",
      storageBucket: "toolsbd24.firebasestorage.app",
      messagingSenderId: "661782480607",
      appId: "1:661782480607:web:9e517726a1e282e15f4b6a",
      measurementId: "G-JLKLZDLSWJ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Make db available globally
    window.firebaseDB = db;
    window.firebaseUtils = { doc, getDoc, setDoc, updateDoc, increment };

    // Load non-critical CSS
    function loadNonCriticalCSS() {
      const stylesheets = [
  
        '/css/category.css',
        '/css/sort-catagory.css',
        '/css/slide-cetegories.css',  
        '/blog/css/homeposts.css',
        '/components/footer.css',
        '/components/header.css',
      ];
      
      stylesheets.forEach(href => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = href;
        document.head.appendChild(link);
      });
    }

    // Initialize components
    document.addEventListener('DOMContentLoaded', async function() {
      // Theme toggle
      const toggleTheme = document.getElementById('toggleTheme');
      if (toggleTheme) {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
        
        toggleTheme.checked = isDark;
        
        toggleTheme.addEventListener('change', function() {
          const isDark = toggleTheme.checked;
          document.documentElement.classList.toggle('dark-mode', isDark);
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
      }

      // Load non-critical CSS
      loadNonCriticalCSS();

     
      // Category click tracking
      setupCategoryClickTracking();
      
      // Load blog posts
      if (typeof window.loadRecentPosts === 'function') {
        window.loadRecentPosts();
      }
      
      // Load updates slider
      try {
        const module = await import('/scripts/cat-slide.js');
        if (typeof module.initUpdatesSlider === 'function') {
          module.initUpdatesSlider();
        }
      } catch (error) {
        console.error('Error loading updates slider:', error);
      }
    });

    // Section loading function
    function loadSection(url, elementId) {
      if (!elementId || !document.getElementById(elementId)) return;
      
      fetch(url)
        .then(res => res.text())
        .then(html => {
          document.getElementById(elementId).innerHTML = html;
        })
        .catch(err => console.log("Error loading section:", err));
    }

    // Category click tracking
    function setupCategoryClickTracking() {
      const items = document.querySelectorAll('.main-catagory-item');
      
      if (!items.length || !window.firebaseDB || !window.firebaseUtils) {
        return;
      }
      
      items.forEach(item => {
        const eyeCountSpan = item.querySelector('.eye-count');
        if (!eyeCountSpan) return;
        
        const href = item.getAttribute('href');
        if (!href) return;
        
        const slug = href.replace(/\//g, '').trim() || 'default';
        const docRef = doc(window.firebaseDB, "category_clicks", slug);
        
        // Load initial count
        getDoc(docRef).then(docSnap => {
          if (docSnap.exists()) {
            eyeCountSpan.textContent = docSnap.data().count || 0;
          } else {
            setDoc(docRef, { count: 0, name: slug });
            eyeCountSpan.textContent = 0;
          }
        });
        
        // Click handler
        item.addEventListener('click', async (e) => {
          e.preventDefault();
          
          try {
            await updateDoc(docRef, { count: increment(1) });
            const updatedSnap = await getDoc(docRef);
            eyeCountSpan.textContent = updatedSnap.data().count || 0;
            window.location.href = href;
          } catch (err) {
            console.error(err);
            window.location.href = href;
          }
        });
      });
    }
  </script>
