<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script>
    (function () {
      try {
        const theme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = theme === 'dark' || (!theme && prefersDark);
        if (isDark) {
          document.documentElement.classList.add('dark-mode');
        }
      } catch (e) {}
    })();
  </script>
  <title>কোরআন সূরা অনুবাদ</title>
 <link rel="stylesheet" href="/css/sub-file.css" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/components/header.css" />
  <link rel="stylesheet" href="/components/footer.css" />
  <style>




.left-panel {
  width: 30%;
  border-right: 1px solid #ddd;
  overflow-y: auto;
  padding: 20px;
}

.left-panel h1 {
  margin-top: 0;
  font-size: 22px;
  color: #077A7D;
  text-align: center;
  margin-bottom: 20px;
}

#surahList {
  list-style: none;
  padding: 0;
  margin: 0;
}

#surahList li {
  padding: 10px 8px;
  cursor: pointer;
  border-bottom: 1px solid #eee;
  transition: background-color 0.2s;
  user-select: none;
}

#surahList li:hover, #surahList li.active {
  background-color: #e6f2f0;
  font-weight: bold;
  color: #066264;
}

.right-panel {
  width: 70%;
  padding: 20px;
  overflow-y: auto;
  
}

.right-panel h2 {
  margin-top: 0;
  color: #007B5E;
  border-bottom: 2px solid #007B5E;
  padding-bottom: 10px;
}

.ayah {
  margin-bottom: 15px;
  border-bottom: 1px dashed #ddd;
  padding-bottom: 10px;
}

.arabic {
  font-size: 28px;
  direction: rtl;
  text-align: right;
  color: #222;
  font-weight: 700;
  margin-bottom: 6px;
}

.translation {
  margin-top: 4px;
  font-size: 18px;
  color: #555;
  line-height: 1.4;
}

.ayah-number {
  font-weight: bold;
  color: #077A7D;
  margin-bottom: 5px;
}

/* ================== মোবাইল রেস্পন্সিভ ================== */
@media screen and (max-width: 600px) {
  .left-panel, .right-panel {
    width: 100%;
    padding: 10px;
  }
  .left-panel {
    border-right: none;
    border-bottom: 1px solid #ddd;
  }
  .left-panel h1 {
    font-size: 18px;
  }
  #surahList li {
    padding: 8px 6px;
    font-size: 14px;
  }
  .right-panel h2 {
    font-size: 20px;
    padding-bottom: 6px;
  }
  .arabic {
    font-size: 20px;
  }
  .translation {
    font-size: 14px;
  }
  .ayah-number {
    font-size: 14px;
  }
}



    html.dark-mode .left-panel {
      border-color: #3a5a59;
      background: transparent;
    }

    html.dark-mode .left-panel h1 {
      color: #4db6ac;
    }

    html.dark-mode #surahList li {
      border-bottom: 1px solid #3a5a59;
      color: #b2dfdb;
    }

    html.dark-mode #surahList li:hover,
    html.dark-mode #surahList li.active {
      background-color: #357a72;
      color: #a7ffeb;
      font-weight: bold;
    }

    html.dark-mode .right-panel {
      background: #22443d;
    }

    html.dark-mode .right-panel h2 {
      color: #4db6ac;
      border-color: #4db6ac;
    }

    html.dark-mode .ayah {
      border-bottom-color: #3a5a59;
    }

    html.dark-mode .arabic {
      color: #a7ffeb;
    }

    html.dark-mode .translation {
      color: #b2dfdb;
    }

    html.dark-mode .ayah-number {
      color: #4db6ac;
    }
  </style>
</head>
<body>

<main class="file-section">
  <div class="file-container">
    <div class="left-panel">
      <h1>সূরা তালিকা</h1>
      <ul id="surahList"></ul>
    </div>
    <div class="right-panel" id="surahContent">
      <h2>সূরা নির্বাচন করুন</h2>
      <p>বাম থেকে সূরা নির্বাচন করুন অনুবাদ দেখতে।</p>
      <p style="color: #00aa55; font-size: 14px; margin-top: 20px; margin-bottom: 10px;">📑অনেক সময় সূরা লোড হতে কিছুটা সময় লাগতে পারে। দয়া করে একটু অপেক্ষা করুন।
    </p><p>📥 সূরা সংগ্রহ করা হয়েছে <strong>alquran.cloud</strong> থেকে।
  </p>
    </div>
  </div>
</main>

  <script>
    const surahNames = [
      "Al-Fatihah","Al-Baqarah","Aal-e-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus",
      "Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha",
      "Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum",
      "Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir",
      "Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf",
      "Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadila","Al-Hashr","Al-Mumtahanah",
      "As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij",
      "Nuh","Al-Jinn","Al-Muzzammil","Al-Muddathir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa",
      "At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad",
      "Ash-Shams","Al-Lail","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyina","Az-Zalzala","Al-Adiyat",
      "Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr",
      "Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"
    ];

    const listEl = document.getElementById("surahList");
    const surahContentEl = document.getElementById("surahContent");

    let activeIndex = null;

    surahNames.forEach((name, idx) => {
      const li = document.createElement("li");
      const num = idx + 1;
      li.textContent = `${num}. ${name}`;
      li.addEventListener("click", () => {
        if (activeIndex !== null) {
          listEl.children[activeIndex].classList.remove("active");
        }
        li.classList.add("active");
        activeIndex = idx;
        loadSurah(num, name);
      });
      listEl.appendChild(li);
    });

    async function loadSurah(num, name) {
      surahContentEl.innerHTML = `<h2>${num}. ${name}</h2><p>লোড হচ্ছে...</p>`;
      try {
        const [arabicRes, banglaRes] = await Promise.all([
          fetch(`https://api.alquran.cloud/v1/surah/${num}/ar.alafasy`),
          fetch(`https://api.alquran.cloud/v1/surah/${num}/bn.bengali`)
        ]);

        if (!arabicRes.ok || !banglaRes.ok) {
          throw new Error('ডেটা লোডে সমস্যা হয়েছে');
        }

        const arabicData = await arabicRes.json();
        const banglaData = await banglaRes.json();

        if (!arabicData.data || !banglaData.data) {
          throw new Error('ডেটা পাওয়া যায়নি');
        }

        surahContentEl.innerHTML = `<h2>${num}. ${name}</h2>`;

        const arabicAyahs = arabicData.data.ayahs;
        const banglaAyahs = banglaData.data.ayahs;

        for (let i = 0; i < arabicAyahs.length; i++) {
          const arabicText = arabicAyahs[i].text || '';
          const banglaText = banglaAyahs[i]?.text || 'অনুবাদ পাওয়া যায়নি';

          const div = document.createElement('div');
          div.classList.add('ayah');
          div.innerHTML = `
            <div class="ayah-number">আয়াত ${i + 1}</div>
            <div class="arabic">${arabicText}</div>
            <div class="translation">${banglaText}</div>
          `;
          surahContentEl.appendChild(div);
        }

      } catch (error) {
        console.error(error);
        surahContentEl.innerHTML = `<p>ডেটা লোড করতে সমস্যা হয়েছে। আবার চেষ্টা করুন।</p>`;
      }
    }
  </script>
  <script src="/components/header.js"></script>
<script src="/components/footer.js"></script>
</body>
</html>
