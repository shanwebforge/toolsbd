<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script>
    (function () {
      try {
        const theme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = theme === 'dark' || (!theme && prefersDark);
        if (isDark) {
          document.documentElement.classList.add('dark-mode');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/components/header.css" />
  <link rel="stylesheet" href="/components/footer.css" />
  <title>🎙️ বাংলা ভয়েসওভার জেনারেটর</title>
  <style>
    body {
      font-family: 'Noto Sans Bengali', sans-serif;
      background: #f0f9ff;
      color: #111827;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    html.dark-mode body {
      background: #1e293b;
      color: #e2e8f0;
    }
    textarea {
      width: 100%;
      height: 150px;
      font-size: 18px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #077A7D;
      color: white;
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #066264;
    }
    #status {
      margin-top: 15px;
      font-weight: bold;
    }


    @media (max-width: 768px) {
  h1 {
    font-size: 16px !important;
  }

}
    /* ======= Dark Mode Styles ======= */
html.dark-mode body{
  background: #000;
  color: #a7ffeb;
}

html.dark-mode .container {
  background: #1e293b;
  box-shadow: 0 4px 15px rgba(0,0,0,0.7);
}
  </style>
</head>
<body>
  <h1>🎙️ বাংলা ভয়েসওভার জেনারেটর</h1>
  <p>যেকোনো বাংলা টেক্সট লিখুন, এবং ভয়েস ডাউনলোড করুন:</p>

  <textarea id="textInput" placeholder="এখানে বাংলা টেক্সট লিখুন..."></textarea>
  <br>
  <button onclick="generateVoice()">🎧 ভয়েস জেনারেট করুন</button>
  <div id="status"></div>

  <script>
    async function generateVoice() {
      const text = document.getElementById("textInput").value.trim();
      const status = document.getElementById("status");

      if (!text) {
        status.textContent = "⚠️ অনুগ্রহ করে কিছু টেক্সট লিখুন।";
        return;
      }

      status.textContent = "🎙️ ভয়েস তৈরি হচ্ছে, একটু অপেক্ষা করুন...";

      try {
        const response = await fetch("https://voiceover-api-1.onrender.com//api/voiceover", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });

        if (!response.ok) {
          status.textContent = "❌ ভয়েস তৈরি ব্যর্থ হয়েছে।";
          return;
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "voiceover.mp3";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);

        status.textContent = "✅ ভয়েস ডাউনলোড সম্পন্ন!";
      } catch (error) {
        status.textContent = "❌ সার্ভার থেকে ডেটা নিতে সমস্যা হয়েছে।";
      }
    }
  </script>
  <script src="/components/header.js"></script>
<script src="/components/footer.js"></script>
</body>
</html>
