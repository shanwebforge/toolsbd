<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>Search Toggle</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/components/headerhome1.css">
  <style>


    .search-icon {
      cursor: pointer;
    }

    .search-container {
      display: flex;
      align-items: stretch;
      max-width: 400px;
      margin: 20px auto;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      border: 1px solid #077A7D;
    }

    .search-container input {
      flex-grow: 1;
      border: none;
      padding: 12px 15px;
      font-size: 16px;
      outline: none;
      border-right: 1px solid #077A7D;
    }

    .search-container button {
      background: #077A7D;
      border: none;
      color: white;
      padding: 0 18px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Top Menu Icons -->
  <div class="menu-group">
    <div class="search-icon" id="searchIconBtn">
      <i class="fas fa-search"></i>
    </div>
    <div class="theme-toggle">
      <i class="fas fa-moon-stars"></i>
    </div>
    <div class="menu-toggle" id="menuToggle">
      <i class="fas fa-list"></i>
    </div>
  </div>

  <!-- ✅ Search Input Box (Initially Hidden) -->
  <div class="search-container hidden" id="searchContainer">
    <input type="text" id="searchInput" placeholder="খোঁজ করুন..." />
    <button id="searchBtn" aria-label="Search">
      <i class="fas fa-search"></i>
    </button>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const searchIconBtn = document.getElementById('searchIconBtn');
      const searchContainer = document.getElementById('searchContainer');

      searchIconBtn.addEventListener('click', () => {
        searchContainer.classList.toggle('hidden');
      });

      // Optional: Hide search box if clicked outside
      document.addEventListener('click', (e) => {
        if (!searchContainer.contains(e.target) && !searchIconBtn.contains(e.target)) {
          searchContainer.classList.add('hidden');
        }
      });
    });
  </script>
<script src="/components/headerhome1.js"></script>
</body>
</html>
