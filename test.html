<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Donut Chart</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container {
        background-color: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        max-width: 900px;
        width: 100%;
    }

    .title { text-align:center; margin-bottom:30px; color:#2c3e50; font-size:28px; font-weight:700; }

    /* Info Section */
    .count-section { width:100%; }
    .info-row { 
        display:flex; 
        gap:50px; 
        align-items:center; 
        width:100%; 
        flex-wrap:wrap; 
        justify-content:space-between; 
    }

    /* Left Column */
    .info-left { 
        display:flex; 
        flex-direction:column; 
        gap:20px; 
        flex:1; 
        min-width:250px; 
    }
    .info-item {
        display:flex; 
        align-items:center; 
        font-weight:700; 
        font-size:18px;
        padding:12px 20px; 
        border-radius:8px; 
        background-color: rgba(255,255,255,0.7);
        box-shadow:0 4px 6px rgba(0,0,0,0.1); 
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .info-item i { margin-right:15px; font-size:20px; }
    .info-item:hover { transform:translateY(-5px); box-shadow:0 6px 12px rgba(0,0,0,0.15); }

    .info-item.tools { color:#ec04ec; border-left:4px solid #ec04ec; }
    .info-item.sort { color:#f39c12; border-left:4px solid #f39c12; }
    .info-item.secret { color:#e74c3c; border-left:4px solid #e74c3c; }
    .info-item.total { color:#2ecc71; border-left:4px solid #2ecc71; }

    /* Right Column */
    .info-right { 
        position:relative; 
        width:280px; 
        height:280px; 
        flex-shrink:0; 
        display:flex; 
        justify-content:center; 
        align-items:center; 
    }
    .circle-chart {
        width:100%; 
        height:100%; 
        border-radius:50%;
        background: conic-gradient(#ec04ec 0% 20%, #f39c12 20% 35%, #e74c3c 35% 50%, #2ecc71 50% 100%);
        position:relative; 
        display:flex; 
        justify-content:center; 
        align-items:center;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }
    .circle-chart::before {
        content:""; 
        position:absolute; 
        width:55%; 
        height:55%; 
        border-radius:50%; 
        background:#fff; 
        z-index:1;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
    }
    .segment {
        position:absolute; 
        width:60px; 
        height:60px; 
        display:flex; 
        justify-content:center; 
        align-items:center;
        font-weight:bold; 
        color:#fff; 
        z-index:2; 
        font-size:18px; 
        text-shadow:1px 1px 3px rgba(0,0,0,0.5);
        border-radius:50%; 
        background-color: rgba(0,0,0,0.3);
    }
    /* Segment positions */
    .segment-tools { top:10%; left:75%; transform:translateX(-50%); background-color: rgba(236,4,236,0.7); }
    .segment-sort { top:53%; right:0%; transform:translateY(-50%); background-color: rgba(243,156,18,0.7); }
    .segment-secret { bottom:16%; right:20%; transform:translateY(50%); background-color: rgba(231,76,60,0.7); }
    .segment-total { top:50%; left:0%; transform:translateY(-50%); background-color: rgba(46,204,113,0.7); }

    /* Mobile Layout */
    @media(max-width:768px) {
        .info-row { 
            flex-direction: column; 
            gap: 30px; 
            align-items: center; 
        }
        
        .info-left { 
            width: 100%; 
            max-width: none; 
            flex-direction: row; 
            flex-wrap: wrap; 
            justify-content: space-between;
            gap: 15px;
        }
        
        .info-item {
            width: 48%; 
            min-height: 80px;
            flex-direction: column;
            text-align: center;
            padding: 15px 10px;
            font-size: 16px;
        }
        
        .info-item i { 
            margin-right: 0; 
            margin-bottom: 8px; 
            font-size: 24px; 
        }
        
        .info-right {
            width: 100%;
            max-width: 280px;
            height: 280px;
        }
    }

    /* Small Mobile Layout */
    @media(max-width:480px){
        .container {
            padding: 20px 15px;
        }
        
        .title {
            font-size: 22px;
            margin-bottom: 20px;
        }
        
        .info-left {
            flex-direction: column;
            gap: 12px;
        }
        
        .info-item {
            width: 100%;
            min-height: 70px;
            flex-direction: row;
            text-align: left;
            padding: 12px 15px;
            font-size: 14px;
        }
        
        .info-item i { 
            margin-right: 12px; 
            margin-bottom: 0; 
            font-size: 20px; 
        }
        
        .info-right {
            width: 100%;
            max-width: 220px;
            height: 220px;
        }
        
        .segment {
            width: 45px;
            height: 45px;
            font-size: 14px;
        }
    }
</style>
</head>
<body>
<div class="container">
    <h1 class="title">File Statistics Dashboard</h1>
    <section class="count-section">
        <div class="info-row">
            <!-- Left Column -->
            <div class="info-left">
                <div class="info-item tools"><i class="fas fa-toolbox"></i> Tools Files</div>
                <div class="info-item sort"><i class="fas fa-sort-amount-down"></i> Sort Key Files</div>
                <div class="info-item secret"><i class="fas fa-lock"></i> Secret Code Files</div>
                <div class="info-item total"><i class="fas fa-calculator"></i> Total Files</div>
            </div>

            <!-- Right Column -->
            <div class="info-right">
                <div class="circle-chart">
                    <div class="segment segment-tools">91+</div>
                    <div class="segment segment-sort">18+</div>
                    <div class="segment segment-secret">6+</div>
                    <div class="segment segment-total">125+</div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
