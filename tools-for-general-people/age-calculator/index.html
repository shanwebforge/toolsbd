<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    (function () {
      try {
        const theme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = theme === 'dark' || (!theme && prefersDark);
        if (isDark) {
          document.documentElement.classList.add('dark-mode');
        }
      } catch (e) {}
    })();
  </script>
  <title>Age Calculator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/sub-file.css" />
<link rel="stylesheet" href="/css/styles.css" />
<link rel="stylesheet" href="/components/header.css">
<link rel="stylesheet" href="/components/footer.css">
<style>


input[type="date"] {
  padding: 10px;
  font-size: 16px;
  border-radius: 6px;
  border: none;
  width: 70%;
  margin: 0 auto 15px;
  display: block;
  text-align: center;
  background: #334155;
  color: #e0f2f1;
}

input[type="date"]::placeholder {
  color: #94a3b8;
}

button {
  padding: 10px 20px;
  background: #077A7D;
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  width: 100%;
  transition: background-color 0.3s ease;

}

button:hover {
  background: #066264;
}

.result {
  margin-top: 20px;
  font-size: 18px;
  line-height: 1.5;
  color: #a6dfe0;
}
@media (max-width: 768px) {
  h1 {
    font-size: 16px !important;
  }

}


html.dark-mode input[type="date"] {
  background: #475569;
  color: #cbd5e1;
  border: 1px solid #64748b;
}
</style>
</head>
<body>
 <main class="file-section">
  <div class="file-container">

<div class="file-header">
    <div class="file-title">
        <h2>🎂 Age Calculator</h2>
        <div class="title-underline"></div>
    </div>
    
    <div class="file-content-text">
        <p>Calculate exact age in years, months, weeks, and days</p>
        <p>Find how many days until your next birthday</p>
        <p>Calculate age at a specific future or past date</p>
        <p>Convert age between different time units</p>
        <p>Compare ages between two different persons</p>
        <p>Calculate pet age in "human years" equivalent</p>
    </div>
</div>
  <div class="file-footer">
  <input type="date" id="dob" />
  <button id="calc-btn">Calculate Age</button>

  <div id="result-en" class="result"></div>
  <div id="result-bn" class="result"></div>
</div>
  </div>
  </main>
<script>const calcBtn = document.getElementById('calc-btn');
const dobInput = document.getElementById('dob');
const resultEn = document.getElementById('result-en');
const resultBn = document.getElementById('result-bn');

// Bangla numbers map
const banglaDigits = {
  0: '০',
  1: '১',
  2: '২',
  3: '৩',
  4: '৪',
  5: '৫',
  6: '৬',
  7: '৭',
  8: '৮',
  9: '৯'
};

function toBanglaNumber(num) {
  return num.toString().split('').map(d => banglaDigits[d] || d).join('');
}

function calculateAge(dob) {
  const birthDate = new Date(dob);
  const today = new Date();

  let years = today.getFullYear() - birthDate.getFullYear();
  let months = today.getMonth() - birthDate.getMonth();
  let days = today.getDate() - birthDate.getDate();

  if (days < 0) {
    months--;
    days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
  }

  if (months < 0) {
    years--;
    months += 12;
  }

  return { years, months, days };
}

calcBtn.addEventListener('click', () => {
  const dob = dobInput.value;
  if (!dob) {
    alert("Please select your date of birth.");
    return;
  }

  const { years, months, days } = calculateAge(dob);

  // English
  resultEn.textContent = `You are ${years} years, ${months} months, and ${days} days old.`;

  // Bangla
  resultBn.textContent = `আপনার বয়স ${toBanglaNumber(years)} বছর, ${toBanglaNumber(months)} মাস, ${toBanglaNumber(days)} দিন।`;
});
</script>
<script src="/components/header.js"></script>
<script src="/components/footer.js"></script>
</body>
</html>
