<section class="latest-updates-section">
  <div class="slider-notice-title-h1">Latest Updates</div>
  <div class="slider-container">
    <div id="updatesSlider" class="updates-slider"></div>
  </div>
</section>

<style>
  /* Prevent horizontal overflow */
html, body {
  overflow-x: hidden;
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

*, *::before, *::after {
  box-sizing: inherit;
}
.latest-updates-section {
  max-width: 800px;
  margin: 2rem auto;
  padding: 1rem;
  border-radius: 12px;
  background: #f9f9f9;
  overflow: hidden;
  position: relative;
}
html.dark-mode .latest-updates-section { background: #1f1f1f; }

.update-heading {
  text-align: center;
  margin-bottom: 1rem;
  font-size: 1.5rem;
  color: #077A7D;
}
html.dark-mode .update-heading { color: #0aa0a3; }

.slider-container {
  overflow: hidden;
  width: 100%;
  position: relative;
}

.updates-slider {
  display: flex;
  transition: transform 0.3s ease;
  gap: 1rem;
}

.update-card {
  min-width: 100%;
  box-sizing: border-box;
  padding: 1rem;
  border-radius: 10px;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
html.dark-mode .update-card { background: #2a2a2a; color: #f0f0f0; box-shadow: 0 2px 8px rgba(255,255,255,0.05); }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC4qAilm3cAJ8FTnv8R66YhG1rEITgKsoM",
  authDomain: "toolsbd24.firebaseapp.com",
  projectId: "toolsbd24",
  storageBucket: "toolsbd24.appspot.com",
  messagingSenderId: "661782480607",
  appId: "1:661782480607:web:9e517726a1e282e15f4b6a",
  measurementId: "G-JLKLZDLSWJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const slider = document.getElementById("updatesSlider");
let currentIndex = 0;
let isDragging = false, startX = 0, currentTranslate = 0, prevTranslate = 0;

const updatesRef = collection(db, "updates");
const q = query(updatesRef, orderBy("timestamp", "desc"));

onSnapshot(q, snapshot => {
  const allUpdates = [];
  snapshot.forEach(doc => allUpdates.push(doc.data()));
  renderSlides(allUpdates);
});

function renderSlides(updates) {
  slider.innerHTML = "";
  updates.forEach(item => {
    const card = document.createElement("div");
    card.className = "update-card";
    card.innerHTML = `<h3>${item.title}</h3><p>${item.content}</p>`;
    slider.appendChild(card);

    // Touch / Mouse events
    card.addEventListener('touchstart', touchStart);
    card.addEventListener('touchmove', touchMove);
    card.addEventListener('touchend', touchEnd);
    card.addEventListener('mousedown', touchStart);
    card.addEventListener('mousemove', touchMove);
    card.addEventListener('mouseup', touchEnd);
    card.addEventListener('mouseleave', touchEnd);
  });
  currentIndex = 0;
  updateSliderPosition();
}

function updateSliderPosition() {
  slider.style.transform = `translateX(-${currentIndex * 100}%)`;
}

// Touch / Drag handlers
function touchStart(e) {
  isDragging = true;
  startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
}

function touchMove(e) {
  if (!isDragging) return;
  const currentX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
  const diff = currentX - startX;
  slider.style.transform = `translateX(${-currentIndex * 100 + diff/slider.clientWidth*100}%)`;
}

function touchEnd(e) {
  if (!isDragging) return;
  isDragging = false;
  const endX = e.type.includes('mouse') ? e.pageX : e.changedTouches[0].clientX;
  const diff = endX - startX;
  if (diff > 50) currentIndex = Math.max(currentIndex - 1, 0);
  else if (diff < -50) currentIndex = Math.min(currentIndex + 1, slider.children.length - 1);
  updateSliderPosition();
}
</script>
